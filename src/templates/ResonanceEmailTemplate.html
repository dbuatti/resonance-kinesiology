<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resonance Kinesiology</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        /* RESET STYLES */
        body { margin: 0; padding: 0; min-width: 100%; width: 100% !important; height: 100% !important; background-color: #FDFCFB; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; -webkit-font-smoothing: antialiased; }
        table { border-spacing: 0; border-collapse: collapse; }
        img { border: 0; line-height: 100%; outline: none; text-decoration: none; }
        
        /* LAYOUT */
        .wrapper { width: 100%; table-layout: fixed; background-color: #FDFCFB; padding-bottom: 60px; }
        .main { background-color: #ffffff; margin: 0 auto; width: 100%; max-width: 600px; border-spacing: 0; color: #1E3261; border-radius: 40px; overflow: hidden; margin-top: 40px; border: 1px solid #E0F2FE; box-shadow: 0 20px 40px -10px rgba(30, 50, 97, 0.05); }
        
        /* TOP ACCENT */
        .top-bar { height: 6px; background-color: #D46A9B; width: 100%; }

        /* HEADER */
        .header { padding: 56px 40px 40px 40px; text-align: center; }
        .logo { color: #1E3261; font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700; letter-spacing: 0.02em; }
        .sub-logo { color: #D46A9B; font-size: 11px; font-weight: 900; letter-spacing: 0.4em; margin-top: 16px; text-transform: uppercase; opacity: 0.8; }

        /* CONTENT */
        .content { padding: 0 56px 48px 56px; line-height: 1.8; font-size: 17px; color: #334155; font-weight: 300; }
        .content h1, .content h2, .content h3 { color: #1E3261; font-family: 'Playfair Display', serif; font-weight: 700; margin-top: 0; margin-bottom: 24px; line-height: 1.3; }
        .content p { margin-bottom: 28px; }
        .content strong { color: #1E3261; font-weight: 700; }
        .content a { color: #D46A9B; text-decoration: none; border-bottom: 1px solid rgba(212, 106, 155, 0.3); font-weight: 600; }
        
        /* SIGNATURE */
        .signature { padding: 0 56px 56px 56px; }
        .sig-name { font-family: 'Playfair Display', serif; font-weight: 700; color: #1E3261; font-size: 20px; margin-bottom: 4px; }
        .sig-title { color: #D46A9B; font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.15em; }

        /* FOOTER */
        .footer { width: 100%; max-width: 600px; margin: 0 auto; padding: 48px 20px; text-align: center; color: #64748b; font-size: 13px; }
        .footer a { color: #1E3261; text-decoration: none; font-weight: 700; }
        .footer-divider { height: 1px; background-color: #E0F2FE; margin-bottom: 32px; width: 80px; margin-left: auto; margin-right: auto; }
        .quote { font-style: italic; font-family: 'Playfair Display', serif; font-size: 18px; color: #1E3261; margin-bottom: 24px; opacity: 0.9; }
        
        /* BUTTONS */
        .btn-container { padding: 10px 0 30px 0; text-align: center; }
        .btn { background-color: #1E3261; color: #ffffff !important; padding: 18px 40px; border-radius: 100px; text-decoration: none !important; display: inline-block; font-weight: 700; font-size: 15px; letter-spacing: 0.05em; box-shadow: 0 12px 20px -5px rgba(30, 50, 97, 0.25); border: none; }

        /* MOBILE OPTIMIZATION */
        @media screen and (max-width: 600px) {
            .main { margin-top: 0; border-radius: 0; border: none; }
            .content { padding: 0 32px 40px 32px; font-size: 16px; }
            .header { padding: 48px 20px 32px 20px; }
            .signature { padding: 0 32px 48px 32px; }
        }
    </style>
</head>
<body>
    <center class="wrapper">
        <table class="main" role="presentation">
            <!-- Top Accent Bar -->
            <tr>
                <td><div class="top-bar"></div></td>
            </tr>
            
            <!-- Header -->
            <tr>
                <td class="header">
                    <div class="logo">✦ Resonance Kinesiology</div>
                    <div class="sub-logo">Neuro-Somatic Support</div>
                </td>
            </tr>
            
            <!-- Body Content -->
            <tr>
                <td class="content">
                    {{ message_content }}
                </td>
            </tr>
            
            <!-- Signature Area -->
            <tr>
                <td class="signature">
                    <table width="100%">
                        <tr>
                            <td style="border-top: 1px solid #F1F5F9; padding-top: 32px;">
                                <div class="sig-name">Daniele Buatti</div>
                                <div class="sig-title">Neuro-Somatic Kinesiologist</div>
                                <div style="margin-top: 12px; font-size: 12px; color: #94A3B8;">Richmond & Toorak, Melbourne</div>
                            </td>
                        </tr>
                    </table>
                </td>
            </tr>
        </table>

        <!-- Footer -->
        <table class="footer" role="presentation">
            <tr>
                <td>
                    <div class="footer-divider"></div>
                    <div class="quote">"Come home to your body."</div>
                    <p style="margin-bottom: 20px; line-height: 1.6;">
                        {{ address }}
                    </p>
                    <p>
                        <a href="{{ unsubscribe_url }}">Unsubscribe</a> &nbsp;•&nbsp; 
                        <a href="{{ subscriber_preferences_url }}">Update Preferences</a>
                    </p>
                    <div style="margin-top: 32px; opacity: 0.3; font-size: 10px; text-transform: uppercase; letter-spacing: 0.2em; font-weight: 900;">
                        Resonance with Daniele
                    </div>
                </td>
            </tr>
        </table>
    </center>
</body>
</html>
